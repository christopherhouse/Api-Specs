# ---------------------------------------------------------------------------
# Input types
# ---------------------------------------------------------------------------

"""Filter arguments for listing accounts."""
input AccountFilterInput {
  """Filter by account status."""
  status: AccountStatus
  """Filter by industry vertical."""
  industry: String
  """Restrict to a specific backend CRM system."""
  sourceSystem: SourceSystem
  """Full-text search against account name."""
  search: String
}

"""Filter arguments for listing contacts."""
input ContactFilterInput {
  """Filter contacts belonging to a specific account."""
  accountId: UUID
  """Restrict to a specific backend CRM system."""
  sourceSystem: SourceSystem
  """Full-text search against contact name or email."""
  search: String
}

"""Filter arguments for listing leads."""
input LeadFilterInput {
  """Filter by lead status."""
  status: LeadStatus
  """Filter leads assigned to a specific owner."""
  ownerId: UUID
  """Restrict to a specific backend CRM system."""
  sourceSystem: SourceSystem
  """Full-text search against lead name or company."""
  search: String
}

"""Filter arguments for listing opportunities."""
input OpportunityFilterInput {
  """Filter opportunities linked to a specific account."""
  accountId: UUID
  """Filter by pipeline stage."""
  stage: OpportunityStage
  """Filter opportunities assigned to a specific owner."""
  ownerId: UUID
  """Restrict to a specific backend CRM system."""
  sourceSystem: SourceSystem
}

"""Filter arguments for listing activities."""
input ActivityFilterInput {
  """Filter by the type of the related CRM record."""
  relatedToType: RelatedToType
  """Filter activities related to a specific record."""
  relatedToId: UUID
  """Filter by activity type."""
  activityType: ActivityType
  """Restrict to a specific backend CRM system."""
  sourceSystem: SourceSystem
}

"""Filter arguments for listing notes."""
input NoteFilterInput {
  """Filter by the type of the related CRM record."""
  relatedToType: RelatedToType
  """Filter notes related to a specific record."""
  relatedToId: UUID
}

"""Postal address input."""
input AddressInput {
  line1: String
  line2: String
  city: String
  stateOrProvince: String
  postalCode: String
  country: String
}

"""Monetary amount input."""
input MonetaryAmountInput {
  amount: Decimal!
  """ISO 4217 three-letter currency code."""
  currency: String!
}

