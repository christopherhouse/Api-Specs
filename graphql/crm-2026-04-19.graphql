"""
Unified CRM API — GraphQL SDL

Facade schema that presents a single, system-agnostic interface over
Salesforce and Microsoft Dynamics 365 CRM. Callers are completely
insulated from which system of record holds any given resource.
All mutation operations are routed to the authoritative backend;
read operations may aggregate results from both platforms.
"""

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

"""ISO-8601 date-time string (e.g. 2026-04-19T12:00:00Z)"""
scalar DateTime

"""ISO-8601 calendar date string (e.g. 2026-04-19)"""
scalar Date

"""Monetary decimal value as a string to avoid float rounding"""
scalar Decimal

"""RFC-4122 UUID"""
scalar UUID

"""Absolute URI string"""
scalar URI

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

"""The backend CRM system that is the system of record for a resource."""
enum SourceSystem {
  """Salesforce CRM"""
  SALESFORCE
  """Microsoft Dynamics 365"""
  DYNAMICS
}

"""Lifecycle status of a CRM account."""
enum AccountStatus {
  """Account is active and engaged."""
  ACTIVE
  """Account is inactive."""
  INACTIVE
  """Account is a prospect not yet converted to a customer."""
  PROSPECT
  """Account has churned."""
  CHURNED
}

"""Qualification status of a lead."""
enum LeadStatus {
  """Lead has just been created."""
  NEW
  """Lead has been contacted."""
  CONTACTED
  """Lead has been qualified."""
  QUALIFIED
  """Lead has been disqualified."""
  DISQUALIFIED
  """Lead has been converted to Account + Contact."""
  CONVERTED
}

"""Pipeline stage of a sales opportunity."""
enum OpportunityStage {
  """Initial prospecting stage."""
  PROSPECTING
  """Opportunity is being qualified."""
  QUALIFICATION
  """A proposal has been submitted."""
  PROPOSAL
  """Active negotiation with the prospect."""
  NEGOTIATION
  """Deal was won."""
  CLOSED_WON
  """Deal was lost."""
  CLOSED_LOST
}

"""Category of a CRM activity."""
enum ActivityType {
  """A to-do task."""
  TASK
  """A phone call."""
  CALL
  """A scheduled meeting."""
  MEETING
  """An email communication."""
  EMAIL
}

"""Completion status of a CRM activity."""
enum ActivityStatus {
  """Activity is scheduled but not started."""
  PLANNED
  """Activity is in progress."""
  IN_PROGRESS
  """Activity has been completed."""
  COMPLETED
  """Activity was cancelled."""
  CANCELLED
}

"""Qualification rating for a lead."""
enum LeadRating {
  """High-priority lead."""
  HOT
  """Medium-priority lead."""
  WARM
  """Low-priority lead."""
  COLD
}

"""The type of CRM record to which an activity or note is related."""
enum RelatedToType {
  ACCOUNT
  CONTACT
  LEAD
  OPPORTUNITY
}

# ---------------------------------------------------------------------------
# Interfaces
# ---------------------------------------------------------------------------

"""Common fields present on every CRM resource."""
interface CrmNode {
  """Unified identifier assigned by the facade (UUID)."""
  id: UUID!
  """Metadata linking this record to its upstream CRM system."""
  sourceSystemMeta: SourceSystemMeta!
  """When the record was created (UTC)."""
  createdAt: DateTime!
  """When the record was last updated (UTC)."""
  updatedAt: DateTime!
}

# ---------------------------------------------------------------------------
# Common types
# ---------------------------------------------------------------------------

"""Metadata about the upstream CRM system that owns a record."""
type SourceSystemMeta {
  """The backend CRM system."""
  sourceSystem: SourceSystem!
  """The native identifier of this record in the upstream CRM system."""
  sourceSystemId: String!
  """Deep-link URL to the record in the upstream CRM console."""
  sourceSystemUrl: URI
}

"""A postal address."""
type Address {
  """First line of the street address."""
  line1: String
  """Second line of the street address (suite, floor, etc.)."""
  line2: String
  """City or locality."""
  city: String
  """State, province, or region."""
  stateOrProvince: String
  """Postal or ZIP code."""
  postalCode: String
  """ISO 3166-1 alpha-2 country code."""
  country: String
}

"""A currency-denominated monetary value."""
type MonetaryAmount {
  """Numeric amount."""
  amount: Decimal!
  """ISO 4217 three-letter currency code (e.g. USD)."""
  currency: String!
}

"""Standard Relay-compatible pagination metadata."""
type PageInfo {
  """Whether more pages exist after this one."""
  hasNextPage: Boolean!
  """Whether more pages exist before this one."""
  hasPreviousPage: Boolean!
  """Cursor for the first item in this page."""
  startCursor: String
  """Cursor for the last item in this page."""
  endCursor: String
}

# ---------------------------------------------------------------------------
# Account types
# ---------------------------------------------------------------------------

"""A company or organisation tracked in the unified CRM."""
type Account implements CrmNode {
  """Unified identifier assigned by the facade (UUID)."""
  id: UUID!
  """Legal or trading name of the account."""
  name: String!
  """Lifecycle status."""
  status: AccountStatus!
  """Industry vertical."""
  industry: String
  """Corporate website."""
  website: URI
  """Primary phone number."""
  phone: String
  """Registered billing address."""
  billingAddress: Address
  """Last reported annual revenue."""
  annualRevenue: MonetaryAmount
  """Approximate headcount."""
  numberOfEmployees: Int
  """Unified ID of the assigned CRM owner."""
  ownerId: UUID
  """Display name of the assigned CRM owner."""
  ownerName: String
  """Free-text description."""
  description: String
  """Metadata linking this record to its upstream CRM system."""
  sourceSystemMeta: SourceSystemMeta!
  """When the record was created (UTC)."""
  createdAt: DateTime!
  """When the record was last updated (UTC)."""
  updatedAt: DateTime!
  """Paginated list of contacts associated with this account."""
  contacts(
    """Number of records to return."""
    first: Int
    """Cursor after which to start."""
    after: String
    """Number of records to return from the end."""
    last: Int
    """Cursor before which to start."""
    before: String
  ): ContactConnection!
  """Paginated list of opportunities associated with this account."""
  opportunities(
    """Number of records to return."""
    first: Int
    """Cursor after which to start."""
    after: String
    """Number of records to return from the end."""
    last: Int
    """Cursor before which to start."""
    before: String
  ): OpportunityConnection!
  """Paginated list of activities associated with this account."""
  activities(
    """Number of records to return."""
    first: Int
    """Cursor after which to start."""
    after: String
    """Number of records to return from the end."""
    last: Int
    """Cursor before which to start."""
    before: String
    """Filter by activity type."""
    type: ActivityType
  ): ActivityConnection!
  """Paginated list of notes associated with this account."""
  notes(
    """Number of records to return."""
    first: Int
    """Cursor after which to start."""
    after: String
    """Number of records to return from the end."""
    last: Int
    """Cursor before which to start."""
    before: String
  ): NoteConnection!
}

"""Edge wrapper for Account in paginated lists."""
type AccountEdge {
  """The account record."""
  node: Account!
  """Opaque pagination cursor for this edge."""
  cursor: String!
}

"""Paginated collection of accounts."""
type AccountConnection {
  """List of account edges in this page."""
  edges: [AccountEdge!]!
  """Relay-compatible pagination metadata."""
  pageInfo: PageInfo!
  """Total number of accounts matching the current filter."""
  totalCount: Int!
}

# ---------------------------------------------------------------------------
# Contact types
# ---------------------------------------------------------------------------

"""An individual person tracked in the unified CRM."""
type Contact implements CrmNode {
  """Unified identifier assigned by the facade (UUID)."""
  id: UUID!
  """Given (first) name."""
  firstName: String!
  """Family (last) name."""
  lastName: String!
  """Full name (firstName + lastName)."""
  fullName: String!
  """Primary email address."""
  email: String
  """Business phone number."""
  phone: String
  """Mobile phone number."""
  mobilePhone: String
  """Job title at the associated account."""
  jobTitle: String
  """Department within the associated account."""
  department: String
  """The account this contact belongs to."""
  account: Account
  """Postal mailing address."""
  mailingAddress: Address
  """Unified ID of the assigned CRM owner."""
  ownerId: UUID
  """Display name of the assigned CRM owner."""
  ownerName: String
  """Whether this contact has opted out of communications."""
  doNotContact: Boolean!
  """Metadata linking this record to its upstream CRM system."""
  sourceSystemMeta: SourceSystemMeta!
  """When the record was created (UTC)."""
  createdAt: DateTime!
  """When the record was last updated (UTC)."""
  updatedAt: DateTime!
  """Paginated list of activities associated with this contact."""
  activities(first: Int, after: String, last: Int, before: String, type: ActivityType): ActivityConnection!
  """Paginated list of notes associated with this contact."""
  notes(first: Int, after: String, last: Int, before: String): NoteConnection!
}

"""Edge wrapper for Contact in paginated lists."""
type ContactEdge {
  """The contact record."""
  node: Contact!
  """Opaque pagination cursor for this edge."""
  cursor: String!
}

"""Paginated collection of contacts."""
type ContactConnection {
  """List of contact edges in this page."""
  edges: [ContactEdge!]!
  """Relay-compatible pagination metadata."""
  pageInfo: PageInfo!
  """Total number of contacts matching the current filter."""
  totalCount: Int!
}

