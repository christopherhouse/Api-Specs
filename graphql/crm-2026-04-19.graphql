# ---------------------------------------------------------------------------
# Query
# ---------------------------------------------------------------------------

"""Root query type for the Unified CRM API."""
type Query {
  """Retrieve a paginated list of CRM accounts."""
  accounts(
    """Optional filter criteria."""
    filter: AccountFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): AccountConnection!

  """Retrieve a single account by its unified identifier."""
  account(
    """Unified account identifier."""
    id: UUID!
  ): Account

  """Retrieve a paginated list of CRM contacts."""
  contacts(
    """Optional filter criteria."""
    filter: ContactFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): ContactConnection!

  """Retrieve a single contact by its unified identifier."""
  contact(
    """Unified contact identifier."""
    id: UUID!
  ): Contact

  """Retrieve a paginated list of leads."""
  leads(
    """Optional filter criteria."""
    filter: LeadFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): LeadConnection!

  """Retrieve a single lead by its unified identifier."""
  lead(
    """Unified lead identifier."""
    id: UUID!
  ): Lead

  """Retrieve a paginated list of sales opportunities."""
  opportunities(
    """Optional filter criteria."""
    filter: OpportunityFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): OpportunityConnection!

  """Retrieve a single opportunity by its unified identifier."""
  opportunity(
    """Unified opportunity identifier."""
    id: UUID!
  ): Opportunity

  """Retrieve a paginated list of activities."""
  activities(
    """Optional filter criteria."""
    filter: ActivityFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): ActivityConnection!

  """Retrieve a single activity by its unified identifier."""
  activity(
    """Unified activity identifier."""
    id: UUID!
  ): Activity

  """Retrieve a paginated list of notes."""
  notes(
    """Optional filter criteria."""
    filter: NoteFilterInput
    """Number of records to return (forward pagination)."""
    first: Int
    """Cursor after which to start (forward pagination)."""
    after: String
    """Number of records to return from the end (backward pagination)."""
    last: Int
    """Cursor before which to start (backward pagination)."""
    before: String
  ): NoteConnection!

  """Retrieve a single note by its unified identifier."""
  note(
    """Unified note identifier."""
    id: UUID!
  ): Note

  """
  Retrieve any CRM node by its unified ID regardless of type.
  Returns null when the ID is not found.
  """
  node(
    """Unified node identifier."""
    id: UUID!
  ): CrmNode
}

# ---------------------------------------------------------------------------
# Mutation
# ---------------------------------------------------------------------------

"""Root mutation type for the Unified CRM API."""
type Mutation {
  # ── Accounts ──────────────────────────────────────────────────────────────

  """Create a new CRM account in the designated system of record."""
  createAccount(input: CreateAccountInput!): Account!

  """Update the mutable fields of an existing CRM account."""
  updateAccount(id: UUID!, input: UpdateAccountInput!): Account!

  """Soft-delete a CRM account in the originating system of record."""
  deleteAccount(id: UUID!): Boolean!

  # ── Contacts ──────────────────────────────────────────────────────────────

  """Create a new CRM contact in the designated system of record."""
  createContact(input: CreateContactInput!): Contact!

  """Update the mutable fields of an existing CRM contact."""
  updateContact(id: UUID!, input: UpdateContactInput!): Contact!

  """Soft-delete a CRM contact in the originating system of record."""
  deleteContact(id: UUID!): Boolean!

  # ── Leads ─────────────────────────────────────────────────────────────────

  """Create a new lead in the designated system of record."""
  createLead(input: CreateLeadInput!): Lead!

  """Update the mutable fields of an existing lead."""
  updateLead(id: UUID!, input: UpdateLeadInput!): Lead!

  """
  Convert a qualified lead into an Account, Contact, and optionally an
  Opportunity. The original lead is marked as CONVERTED.
  """
  convertLead(id: UUID!, input: ConvertLeadInput!): ConvertLeadResult!

  # ── Opportunities ─────────────────────────────────────────────────────────

  """Create a new sales opportunity in the designated system of record."""
  createOpportunity(input: CreateOpportunityInput!): Opportunity!

  """Update an existing opportunity including stage advancement."""
  updateOpportunity(id: UUID!, input: UpdateOpportunityInput!): Opportunity!

  """Soft-delete an opportunity in the originating system of record."""
  deleteOpportunity(id: UUID!): Boolean!

  # ── Activities ────────────────────────────────────────────────────────────

  """Log a new activity against a CRM record."""
  createActivity(input: CreateActivityInput!): Activity!

  """Update the details of an existing activity."""
  updateActivity(id: UUID!, input: UpdateActivityInput!): Activity!

  """Remove an activity from the originating system of record."""
  deleteActivity(id: UUID!): Boolean!

  # ── Notes ─────────────────────────────────────────────────────────────────

  """Create a new note and attach it to a CRM record."""
  createNote(input: CreateNoteInput!): Note!

  """Update the title and body of an existing note."""
  updateNote(id: UUID!, input: UpdateNoteInput!): Note!

  """Remove a note from the originating system of record."""
  deleteNote(id: UUID!): Boolean!
}

# ---------------------------------------------------------------------------
# Subscription
# ---------------------------------------------------------------------------

"""Root subscription type for real-time CRM events."""
type Subscription {
  """
  Emitted whenever an account is created, updated, or deleted.
  Optionally filtered to a specific source system.
  """
  accountChanged(sourceSystem: SourceSystem): Account!

  """
  Emitted whenever a contact is created, updated, or deleted.
  Optionally filtered to a specific source system.
  """
  contactChanged(sourceSystem: SourceSystem): Contact!

  """
  Emitted whenever an opportunity stage changes.
  Optionally filtered to a specific account.
  """
  opportunityStageChanged(accountId: UUID): Opportunity!

  """
  Emitted whenever a lead status changes.
  Useful for monitoring lead qualification pipelines.
  """
  leadStatusChanged: Lead!

  """
  Emitted whenever a new activity is logged.
  Optionally filtered by activity type.
  """
  activityCreated(activityType: ActivityType): Activity!
}
