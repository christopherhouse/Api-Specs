type OpportunityConnection {
  """List of opportunity edges in this page."""
  edges: [OpportunityEdge!]!
  """Relay-compatible pagination metadata."""
  pageInfo: PageInfo!
  """Total number of opportunities matching the current filter."""
  totalCount: Int!
}

