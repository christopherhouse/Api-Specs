  """Unified ID of the related CRM record."""
  relatedToId: UUID
  """Unified ID of the assigned CRM owner."""
  ownerId: UUID
  """Display name of the assigned CRM owner."""
  ownerName: String
  """Metadata linking this record to its upstream CRM system."""
  sourceSystemMeta: SourceSystemMeta!
