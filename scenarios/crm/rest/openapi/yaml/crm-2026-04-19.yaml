openapi: 3.0.0
info:
  title: Unified CRM API
  version: 1.0.0
  description: >
    Facade API that presents a single, system-agnostic interface over
    Salesforce and Microsoft Dynamics 365 CRM. Callers are completely
    insulated from which system of record holds any given resource.
    All mutation operations are routed to the authoritative backend;
    read operations may aggregate results from both platforms.
  contact:
    name: CRM Platform Team
    email: crm-platform@example.com

servers:
  - url: https://api.example.com/crm/v1
    description: Production
  - url: https://sandbox.api.example.com/crm/v1
    description: Sandbox

tags:
  - name: Accounts
    description: Companies and organisations tracked in CRM
  - name: Contacts
    description: Individual people associated with accounts
  - name: Leads
    description: Unqualified inbound prospects
  - name: Opportunities
    description: Qualified sales opportunities and deals
  - name: Activities
    description: Tasks, calls, meetings and emails logged against CRM records
  - name: Notes
    description: Free-text notes attached to any CRM record

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Accounts
  # ---------------------------------------------------------------------------
  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      description: Returns a paginated list of CRM accounts from all connected systems.
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by account status.
          schema:
            type: string
            enum: [active, inactive, prospect, churned]
        - name: industry
          in: query
          description: Filter by industry vertical.
          schema:
            type: string
        - name: sourceSystem
          in: query
          description: Restrict results to a specific backend CRM system.
          schema:
            $ref: '#/components/schemas/SourceSystem'
      responses:
        '200':
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Accounts]
      summary: Create account
      description: Creates a new account in the designated system of record.
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      summary: Get account
      description: Retrieves a single account by its unified identifier.
      operationId: getAccount
      responses:
        '200':
          description: Account retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Accounts]
      summary: Update account
      description: Replaces all mutable fields on an existing account.
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Accounts]
      summary: Delete account
      description: Soft-deletes an account in the originating system of record.
      operationId: deleteAccount
      responses:
        '204':
          description: Account deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Contacts
  # ---------------------------------------------------------------------------
  /contacts:
    get:
      tags: [Contacts]
      summary: List contacts
      description: Returns a paginated list of contacts across all connected CRM systems.
      operationId: listContacts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: accountId
          in: query
          description: Filter contacts belonging to a specific account.
          schema:
            type: string
            format: uuid
        - name: sourceSystem
          in: query
          description: Restrict results to a specific backend CRM system.
          schema:
            $ref: '#/components/schemas/SourceSystem'
      responses:
        '200':
          description: Contacts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Contacts]
      summary: Create contact
      description: Creates a new contact record in the designated system of record.
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactRequest'
      responses:
        '201':
          description: Contact created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /contacts/{contactId}:
    parameters:
      - $ref: '#/components/parameters/ContactId'
    get:
      tags: [Contacts]
      summary: Get contact
      description: Retrieves a single contact by its unified identifier.
      operationId: getContact
      responses:
        '200':
          description: Contact retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Contacts]
      summary: Update contact
      description: Replaces all mutable fields on an existing contact.
      operationId: updateContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactRequest'
      responses:
        '200':
          description: Contact updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Contacts]
      summary: Delete contact
      description: Soft-deletes a contact in the originating system of record.
      operationId: deleteContact
      responses:
        '204':
          description: Contact deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Leads
  # ---------------------------------------------------------------------------
  /leads:
    get:
      tags: [Leads]
      summary: List leads
      description: Returns a paginated list of unqualified prospect leads.
      operationId: listLeads
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by lead status.
          schema:
            type: string
            enum: [new, contacted, qualified, disqualified, converted]
        - name: ownerId
          in: query
          description: Filter leads assigned to a specific owner.
          schema:
            type: string
            format: uuid
        - name: sourceSystem
          in: query
          description: Restrict results to a specific backend CRM system.
          schema:
            $ref: '#/components/schemas/SourceSystem'
      responses:
        '200':
          description: Leads retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Leads]
      summary: Create lead
      description: Creates a new lead record in the designated system of record.
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadRequest'
      responses:
        '201':
          description: Lead created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /leads/{leadId}:
    parameters:
      - $ref: '#/components/parameters/LeadId'
    get:
      tags: [Leads]
      summary: Get lead
      description: Retrieves a single lead by its unified identifier.
      operationId: getLead
      responses:
        '200':
          description: Lead retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Leads]
      summary: Update lead
      description: Updates the mutable fields of an existing lead.
      operationId: updateLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadRequest'
      responses:
        '200':
          description: Lead updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /leads/{leadId}/convert:
    parameters:
      - $ref: '#/components/parameters/LeadId'
    post:
      tags: [Leads]
      summary: Convert lead
      description: Converts a qualified lead into an Account, Contact, and optionally an Opportunity.
      operationId: convertLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertLeadRequest'
      responses:
        '200':
          description: Lead converted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertLeadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Opportunities
  # ---------------------------------------------------------------------------
  /opportunities:
    get:
      tags: [Opportunities]
      summary: List opportunities
      description: Returns a paginated list of sales opportunities across all connected systems.
      operationId: listOpportunities
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: accountId
          in: query
          description: Filter opportunities linked to a specific account.
          schema:
            type: string
            format: uuid
        - name: stage
          in: query
          description: Filter by pipeline stage.
          schema:
            type: string
            enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]
        - name: ownerId
          in: query
          description: Filter opportunities assigned to a specific owner.
          schema:
            type: string
            format: uuid
        - name: sourceSystem
          in: query
          description: Restrict results to a specific backend CRM system.
          schema:
            $ref: '#/components/schemas/SourceSystem'
      responses:
        '200':
          description: Opportunities retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Opportunities]
      summary: Create opportunity
      description: Creates a new sales opportunity in the designated system of record.
      operationId: createOpportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpportunityRequest'
      responses:
        '201':
          description: Opportunity created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /opportunities/{opportunityId}:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    get:
      tags: [Opportunities]
      summary: Get opportunity
      description: Retrieves a single opportunity by its unified identifier.
      operationId: getOpportunity
      responses:
        '200':
          description: Opportunity retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Opportunities]
      summary: Update opportunity
      description: Updates an existing opportunity including stage advancement.
      operationId: updateOpportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpportunityRequest'
      responses:
        '200':
          description: Opportunity updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Opportunities]
      summary: Delete opportunity
      description: Soft-deletes an opportunity in the originating system of record.
      operationId: deleteOpportunity
      responses:
        '204':
          description: Opportunity deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Activities
  # ---------------------------------------------------------------------------
  /activities:
    get:
      tags: [Activities]
      summary: List activities
      description: Returns a paginated list of activities (tasks, calls, meetings, emails).
      operationId: listActivities
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: relatedToType
          in: query
          description: Filter activities by the type of the related CRM record.
          schema:
            type: string
            enum: [account, contact, lead, opportunity]
        - name: relatedToId
          in: query
          description: Filter activities related to a specific record ID.
          schema:
            type: string
            format: uuid
        - name: activityType
          in: query
          description: Filter by activity type.
          schema:
            $ref: '#/components/schemas/ActivityType'
        - name: sourceSystem
          in: query
          description: Restrict results to a specific backend CRM system.
          schema:
            $ref: '#/components/schemas/SourceSystem'
      responses:
        '200':
          description: Activities retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Activities]
      summary: Create activity
      description: Logs a new activity against a CRM record in the designated system of record.
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityRequest'
      responses:
        '201':
          description: Activity created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/{activityId}:
    parameters:
      - $ref: '#/components/parameters/ActivityId'
    get:
      tags: [Activities]
      summary: Get activity
      description: Retrieves a single activity by its unified identifier.
      operationId: getActivity
      responses:
        '200':
          description: Activity retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Activities]
      summary: Update activity
      description: Updates the details of an existing activity record.
      operationId: updateActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActivityRequest'
      responses:
        '200':
          description: Activity updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Activities]
      summary: Delete activity
      description: Removes an activity from the originating system of record.
      operationId: deleteActivity
      responses:
        '204':
          description: Activity deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Notes
  # ---------------------------------------------------------------------------
  /notes:
    get:
      tags: [Notes]
      summary: List notes
      description: Returns a paginated list of notes attached to CRM records.
      operationId: listNotes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: relatedToType
          in: query
          description: Filter notes by the type of the related CRM record.
          schema:
            type: string
            enum: [account, contact, lead, opportunity]
        - name: relatedToId
          in: query
          description: Filter notes related to a specific record ID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notes retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Notes]
      summary: Create note
      description: Creates a new note and attaches it to a CRM record.
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /notes/{noteId}:
    parameters:
      - $ref: '#/components/parameters/NoteId'
    get:
      tags: [Notes]
      summary: Get note
      description: Retrieves a single note by its unified identifier.
      operationId: getNote
      responses:
        '200':
          description: Note retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Notes]
      summary: Update note
      description: Updates the title and body of an existing note.
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Notes]
      summary: Delete note
      description: Removes a note from the originating system of record.
      operationId: deleteNote
      responses:
        '204':
          description: Note deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      description: One-based page number for pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: Number of records per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    AccountId:
      name: accountId
      in: path
      required: true
      description: Unified account identifier (UUID).
      schema:
        type: string
        format: uuid
    ContactId:
      name: contactId
      in: path
      required: true
      description: Unified contact identifier (UUID).
      schema:
        type: string
        format: uuid
    LeadId:
      name: leadId
      in: path
      required: true
      description: Unified lead identifier (UUID).
      schema:
        type: string
        format: uuid
    OpportunityId:
      name: opportunityId
      in: path
      required: true
      description: Unified opportunity identifier (UUID).
      schema:
        type: string
        format: uuid
    ActivityId:
      name: activityId
      in: path
      required: true
      description: Unified activity identifier (UUID).
      schema:
        type: string
        format: uuid
    NoteId:
      name: noteId
      in: path
      required: true
      description: Unified note identifier (UUID).
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: The request payload is invalid or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: The request is syntactically valid but semantically unprocessable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An unexpected error occurred in the server or an upstream CRM system.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # -------------------------------------------------------------------------
    # Enumerations
    # -------------------------------------------------------------------------
    SourceSystem:
      type: string
      description: The backend CRM system that is the system of record for a resource.
      enum: [salesforce, dynamics]

    AccountStatus:
      type: string
      description: Lifecycle status of a CRM account.
      enum: [active, inactive, prospect, churned]

    LeadStatus:
      type: string
      description: Qualification status of a lead.
      enum: [new, contacted, qualified, disqualified, converted]

    OpportunityStage:
      type: string
      description: Pipeline stage of a sales opportunity.
      enum: [prospecting, qualification, proposal, negotiation, closed_won, closed_lost]

    ActivityType:
      type: string
      description: Category of a CRM activity.
      enum: [task, call, meeting, email]

    ActivityStatus:
      type: string
      description: Completion status of an activity.
      enum: [planned, in_progress, completed, cancelled]

    # -------------------------------------------------------------------------
    # Common / Shared
    # -------------------------------------------------------------------------
    SourceSystemMeta:
      type: object
      description: Metadata about the upstream CRM system that owns this record.
      required:
        - sourceSystem
        - sourceSystemId
      properties:
        sourceSystem:
          $ref: '#/components/schemas/SourceSystem'
        sourceSystemId:
          type: string
          description: The native identifier of this record in the upstream CRM system.
        sourceSystemUrl:
          type: string
          format: uri
          description: Deep-link URL to the record in the upstream CRM console.

    Address:
      type: object
      description: Postal address.
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        stateOrProvince:
          type: string
        postalCode:
          type: string
        country:
          type: string

    MonetaryAmount:
      type: object
      description: A currency-denominated monetary value.
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: double
          minimum: 0
        currency:
          type: string
          description: ISO 4217 three-letter currency code.
          pattern: '^[A-Z]{3}$'

    PaginationMeta:
      type: object
      description: Pagination metadata returned with list responses.
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      description: Standard error envelope returned for all non-2xx responses.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable description of the error.
        details:
          type: array
          description: Field-level validation errors, if applicable.
          items:
            $ref: '#/components/schemas/ErrorDetail'
        traceId:
          type: string
          description: Distributed trace identifier for support diagnostics.

    ErrorDetail:
      type: object
      description: Field-level detail within an error response.
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string

