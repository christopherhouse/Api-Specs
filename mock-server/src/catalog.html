<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Mock Server - Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── Design Tokens ─────────────────────────────────────────── */
        :root {
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;

            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);

            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);

            --sidebar-width: 300px;
        }

        /* ─── Light Theme ───────────────────────────────────────────── */
        [data-theme="light"] {
            --bg-body: #f8f9fb;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f3f4f6;
            --bg-surface-active: #e8eaed;
            --bg-muted: #f1f3f5;
            --bg-inset: #e9ecef;
            --bg-code: #f1f3f5;
            --bg-sidebar: #ffffff;

            --border-default: #e2e5e9;
            --border-muted: #eceef1;
            --border-focus: #6366f1;

            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --text-dimmed: #9ca3af;
            --text-inverse: #ffffff;

            --accent: #6366f1;
            --accent-hover: #5558e6;
            --accent-subtle: #eef2ff;
            --accent-muted: rgba(99, 102, 241, 0.12);

            --badge-bg: rgba(99, 102, 241, 0.10);
            --badge-text: #4f46e5;

            --method-get: #3b82f6;
            --method-post: #22c55e;
            --method-put: #f59e0b;
            --method-patch: #14b8a6;
            --method-delete: #ef4444;

            --scrollbar-track: #f1f1f1;
            --scrollbar-thumb: #c1c1c1;
            --scrollbar-thumb-hover: #a8a8a8;
        }

        /* ─── Dark Theme ────────────────────────────────────────────── */
        [data-theme="dark"] {
            --bg-body: #0f1117;
            --bg-surface: #1a1d27;
            --bg-surface-hover: #22252f;
            --bg-surface-active: #2a2d38;
            --bg-muted: #1e2130;
            --bg-inset: #161921;
            --bg-code: #1e2130;
            --bg-sidebar: #14161e;

            --border-default: #2a2d3a;
            --border-muted: #1f2233;
            --border-focus: #818cf8;

            --text-primary: #f1f3f5;
            --text-secondary: #adb5bd;
            --text-muted: #868e96;
            --text-dimmed: #495057;
            --text-inverse: #ffffff;

            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-subtle: rgba(129, 140, 248, 0.12);
            --accent-muted: rgba(129, 140, 248, 0.08);

            --badge-bg: rgba(129, 140, 248, 0.15);
            --badge-text: #a5b4fc;

            --method-get: #60a5fa;
            --method-post: #4ade80;
            --method-put: #fbbf24;
            --method-patch: #2dd4bf;
            --method-delete: #f87171;

            --shadow-xs: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4), 0 4px 6px -4px rgba(0,0,0,0.2);

            --scrollbar-track: #1a1d27;
            --scrollbar-thumb: #2a2d3a;
            --scrollbar-thumb-hover: #3a3d4a;
        }

        /* ─── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            color-scheme: light dark;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-slow), color var(--transition-slow);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* ─── Layout ────────────────────────────────────────────────── */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ─── Sidebar ───────────────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }

        .sidebar-header {
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sidebar-logo svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        .sidebar-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .sidebar-subtitle {
            font-size: 0.6875rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 1px;
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border-color: var(--border-focus);
        }

        .theme-toggle svg {
            width: 16px;
            height: 16px;
        }

        [data-theme="light"] .theme-toggle .icon-sun { display: none; }
        [data-theme="light"] .theme-toggle .icon-moon { display: block; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        /* Search & Filter */
        .search-filter-section {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border-default);
        }

        .search-box {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            font-size: 0.8125rem;
            font-family: var(--font-sans);
            background: var(--bg-muted);
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            transition: all var(--transition-fast);
        }

        .search-box::placeholder {
            color: var(--text-dimmed);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-muted);
            background: var(--bg-surface);
        }

        .filter-section {
            margin-top: 0;
        }

        .filter-label {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dimmed);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .filter-btn {
            padding: 0.3125rem 0.625rem;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            font-size: 0.6875rem;
            font-weight: 500;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--text-muted);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-subtle);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--text-inverse);
            border-color: var(--accent);
        }

        /* Sidebar Tree */
        .scenarios-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.375rem 0;
        }

        .scenario-item {
            margin-bottom: 1px;
        }

        .scenario-header {
            padding: 0.5625rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background var(--transition-fast);
            user-select: none;
        }

        .scenario-header:hover {
            background: var(--bg-surface-hover);
        }

        .scenario-toggle {
            font-size: 0.5rem;
            color: var(--text-dimmed);
            transition: transform var(--transition-fast);
            width: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scenario-item.expanded .scenario-toggle {
            transform: rotate(90deg);
        }

        .scenario-name {
            font-weight: 600;
            font-size: 0.8125rem;
            color: var(--text-primary);
            text-transform: capitalize;
            flex: 1;
        }

        .scenario-count {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-dimmed);
            background: var(--bg-muted);
            padding: 0.125rem 0.5rem;
            border-radius: var(--radius-full);
        }

        .scenario-children {
            display: none;
            padding-left: 0.5rem;
        }

        .scenario-item.expanded .scenario-children {
            display: block;
        }

        .format-group {
            margin-bottom: 0;
        }

        .format-header {
            padding: 0.375rem 1.25rem 0.375rem 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
            user-select: none;
            transition: background var(--transition-fast);
        }

        .format-header:hover {
            background: var(--bg-surface-hover);
        }

        .format-toggle {
            font-size: 0.4375rem;
            color: var(--text-dimmed);
            transition: transform var(--transition-fast);
            width: 10px;
            display: flex;
            align-items: center;
        }

        .format-group.expanded .format-toggle {
            transform: rotate(90deg);
        }

        .format-apis {
            display: none;
        }

        .format-group.expanded .format-apis {
            display: block;
        }

        .api-tree-item {
            padding: 0.375rem 1.25rem 0.375rem 3.25rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.8125rem;
            color: var(--text-secondary);
            border-left: 2px solid transparent;
        }

        .api-tree-item:hover {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .api-tree-item.selected {
            background: var(--accent-subtle);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 500;
        }

        /* ─── Main Content ──────────────────────────────────────────── */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--transition-base);
        }

        /* Top Bar */
        .content-header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-default);
            padding: 1.5rem 2rem;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }

        .content-header h2 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .content-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Stats Bar */
        .stats {
            display: flex;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-default);
            flex-wrap: wrap;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }

        .stat-card {
            background: var(--bg-muted);
            padding: 0.625rem 1rem;
            border-radius: var(--radius-md);
            text-align: center;
            min-width: 80px;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-muted);
        }

        .stat-card:hover {
            border-color: var(--accent);
            background: var(--accent-subtle);
        }

        .stat-card .number {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-top: 0.125rem;
        }

        /* API Grid */
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1rem;
            padding: 1.25rem 2rem 2rem;
        }

        /* API Card */
        .api-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-default);
            overflow: hidden;
            transition: all var(--transition-base);
            cursor: pointer;
        }

        .api-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .api-card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-muted);
            background: var(--bg-muted);
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }

        .api-card-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .api-card-meta {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.1875rem 0.5rem;
            border-radius: var(--radius-full);
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: var(--badge-bg);
            color: var(--badge-text);
        }

        .badge.format-openapi { background: rgba(59,130,246,0.1); color: #3b82f6; }
        .badge.format-graphql { background: rgba(236,72,153,0.1); color: #ec4899; }
        .badge.format-raml { background: rgba(16,185,129,0.1); color: #10b981; }
        .badge.format-wadl { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .badge.format-soap { background: rgba(139,92,246,0.1); color: #8b5cf6; }

        [data-theme="dark"] .badge.format-openapi { background: rgba(96,165,250,0.15); color: #93bbfd; }
        [data-theme="dark"] .badge.format-graphql { background: rgba(244,114,182,0.15); color: #f9a8d4; }
        [data-theme="dark"] .badge.format-raml { background: rgba(52,211,153,0.15); color: #6ee7b7; }
        [data-theme="dark"] .badge.format-wadl { background: rgba(251,191,36,0.15); color: #fcd34d; }
        [data-theme="dark"] .badge.format-soap { background: rgba(167,139,250,0.15); color: #c4b5fd; }

        .api-card-body {
            padding: 1rem 1.25rem;
        }

        .api-info {
            margin-bottom: 0.75rem;
        }

        .api-info:last-child {
            margin-bottom: 0;
        }

        .api-info-label {
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.1875rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .api-info-value {
            color: var(--text-muted);
            font-size: 0.8125rem;
            line-height: 1.5;
        }

        .base-path {
            background: var(--bg-code);
            padding: 0.4375rem 0.625rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            word-break: break-all;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-muted);
            color: var(--text-secondary);
        }

        .endpoints {
            margin-top: 0.75rem;
        }

        .endpoints-title {
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.375rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .endpoint {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3125rem 0.5rem;
            background: var(--bg-muted);
            border-radius: var(--radius-sm);
            margin-bottom: 0.3125rem;
            font-size: 0.75rem;
            border: 1px solid var(--border-muted);
        }

        .method {
            font-weight: 600;
            font-family: var(--font-mono);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.625rem;
            min-width: 48px;
            text-align: center;
            color: white;
            letter-spacing: 0.02em;
        }

        .method.get { background: var(--method-get); }
        .method.post { background: var(--method-post); }
        .method.put { background: var(--method-put); }
        .method.patch { background: var(--method-patch); }
        .method.delete { background: var(--method-delete); }

        .endpoint-path {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .more-endpoints {
            text-align: center;
            color: var(--text-dimmed);
            font-size: 0.75rem;
            margin-top: 0.375rem;
            font-weight: 500;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .no-results-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        .no-results h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .no-results p {
            font-size: 0.875rem;
        }

        /* Mobile menu button */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ─── Responsive ────────────────────────────────────────────── */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 280px;
            }
            .api-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }

        @media (max-width: 768px) {
            :root {
                --sidebar-width: 300px;
            }

            .sidebar {
                transform: translateX(-100%);
                transition: transform var(--transition-slow);
                box-shadow: none;
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }

            .main-content {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .content-header {
                padding: 1.25rem 1rem;
            }

            .stats {
                padding: 0.75rem 1rem;
            }

            .api-grid {
                padding: 0.75rem;
                gap: 0.75rem;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Mobile menu toggle -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
                        </svg>
                    </div>
                    <div>
                        <div class="sidebar-title">API Catalog</div>
                        <div class="sidebar-subtitle">Mock Server</div>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                    </svg>
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                    </svg>
                </button>
            </div>

            <div class="search-filter-section">
                <input
                    type="text"
                    class="search-box"
                    id="searchInput"
                    placeholder="Search scenarios or APIs..."
                >

                <div class="filter-section">
                    <label class="filter-label">Filter by Format</label>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-format="all">All</button>
                        <button class="filter-btn" data-format="openapi">OpenAPI</button>
                        <button class="filter-btn" data-format="graphql">GraphQL</button>
                        <button class="filter-btn" data-format="raml">RAML</button>
                        <button class="filter-btn" data-format="wadl">WADL</button>
                        <button class="filter-btn" data-format="soap">SOAP</button>
                    </div>
                </div>
            </div>

            <div class="scenarios-tree" id="scenariosTree">
                <!-- Will be populated by JavaScript -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h2>API Specifications</h2>
                <p>Select an API from the sidebar or browse all available APIs below</p>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="openapiCount">0</div>
                    <div class="label">OpenAPI</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="graphqlCount">0</div>
                    <div class="label">GraphQL</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="ramlCount">0</div>
                    <div class="label">RAML</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="wadlCount">0</div>
                    <div class="label">WADL</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="soapCount">0</div>
                    <div class="label">SOAP</div>
                </div>
            </div>

            <div class="api-grid" id="apiGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </main>
    </div>

    <script>
        // ─── Theme Management ──────────────────────────────────────
        function getPreferredTheme() {
            const stored = localStorage.getItem('theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Initialize theme
        setTheme(getPreferredTheme());

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Listen for OS-level theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light');
            }
        });

        // ─── Mobile Menu ───────────────────────────────────────────
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('mobileMenuBtn');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')
                && !sidebar.contains(e.target) && !btn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // ─── API Data ──────────────────────────────────────────────
        let apiData = [];

        async function loadAPIData() {
            try {
                const response = await fetch('/catalog/data');
                apiData = await response.json();
                renderAll();
            } catch (error) {
                console.error('Failed to load API data:', error);
            }
        }

        // State
        let currentFilter = 'all';
        let searchTerm = '';

        function renderSidebar() {
            const tree = document.getElementById('scenariosTree');
            const apisByScenario = {};

            apiData.forEach(api => {
                if (!apisByScenario[api.domain]) {
                    apisByScenario[api.domain] = [];
                }
                apisByScenario[api.domain].push(api);
            });

            const scenarios = Object.keys(apisByScenario).sort();

            tree.innerHTML = scenarios.map(scenario => {
                const apis = apisByScenario[scenario];
                const apisByFormat = {};

                apis.forEach(api => {
                    if (!apisByFormat[api.format]) {
                        apisByFormat[api.format] = [];
                    }
                    apisByFormat[api.format].push(api);
                });

                const formatOrder = ['graphql', 'openapi', 'raml', 'wadl', 'soap'];
                const formats = formatOrder.filter(f => apisByFormat[f]);

                return `
                    <div class="scenario-item" data-scenario="${scenario}">
                        <div class="scenario-header">
                            <span class="scenario-toggle">▶</span>
                            <span class="scenario-name">${scenario}</span>
                            <span class="scenario-count">${apis.length}</span>
                        </div>
                        <div class="scenario-children">
                            ${formats.map(format => {
                                const formatLabel = {
                                    'graphql': 'GraphQL',
                                    'openapi': 'REST \u2013 OpenAPI',
                                    'raml': 'REST \u2013 RAML',
                                    'wadl': 'REST \u2013 WADL',
                                    'soap': 'SOAP'
                                }[format];

                                return `
                                    <div class="format-group" data-format="${format}">
                                        <div class="format-header">
                                            <span class="format-toggle">▶</span>
                                            <span>${formatLabel}</span>
                                        </div>
                                        <div class="format-apis">
                                            ${apisByFormat[format].map(api => `
                                                <div class="api-tree-item"
                                                     data-api-id="${api.id}"
                                                     data-format="${format}"
                                                     data-scenario="${scenario}"
                                                     data-console-url="${api.consoleUrl}">
                                                    ${api.title}
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            setupSidebarListeners();
        }

        function renderCards() {
            const grid = document.getElementById('apiGrid');

            grid.innerHTML = apiData.map(api => `
                <div class="api-card"
                     data-api-id="${api.id}"
                     data-format="${api.format}"
                     data-scenario="${api.domain}"
                     data-console-url="${api.consoleUrl}">
                    <div class="api-card-header">
                        <div class="api-card-title">${api.title}</div>
                        <div class="api-card-meta">
                            <span class="badge format-${api.format}">${api.format.toUpperCase()}</span>
                            <span class="badge">${api.domain}</span>
                            ${api.version ? `<span class="badge">v${api.version}</span>` : ''}
                        </div>
                    </div>
                    <div class="api-card-body">
                        ${api.description ? `
                            <div class="api-info">
                                <div class="api-info-label">Description</div>
                                <div class="api-info-value">${api.description}</div>
                            </div>
                        ` : ''}

                        <div class="api-info">
                            <div class="api-info-label">Base Path</div>
                            <div class="base-path">${api.basePath}</div>
                        </div>

                        ${api.endpoints && api.endpoints.length > 0 ? `
                            <div class="endpoints">
                                <div class="endpoints-title">Endpoints (${api.endpoints.length})</div>
                                ${api.endpoints.slice(0, 5).map(e => `
                                    <div class="endpoint">
                                        <span class="method ${e.method.toLowerCase()}">${e.method}</span>
                                        <span class="endpoint-path">${e.path}</span>
                                    </div>
                                `).join('')}
                                ${api.endpoints.length > 5 ? `
                                    <div class="more-endpoints">
                                        +${api.endpoints.length - 5} more endpoints
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            setupCardListeners();
        }

        function renderStats() {
            document.getElementById('totalCount').textContent = apiData.length;
            document.getElementById('openapiCount').textContent = apiData.filter(a => a.format === 'openapi').length;
            document.getElementById('graphqlCount').textContent = apiData.filter(a => a.format === 'graphql').length;
            document.getElementById('ramlCount').textContent = apiData.filter(a => a.format === 'raml').length;
            document.getElementById('wadlCount').textContent = apiData.filter(a => a.format === 'wadl').length;
            document.getElementById('soapCount').textContent = apiData.filter(a => a.format === 'soap').length;
        }

        function renderAll() {
            renderSidebar();
            renderCards();
            renderStats();
        }

        function setupSidebarListeners() {
            document.querySelectorAll('.scenario-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.parentElement.classList.toggle('expanded');
                });
            });

            document.querySelectorAll('.format-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    header.parentElement.classList.toggle('expanded');
                });
            });

            document.querySelectorAll('.api-tree-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.api-tree-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');

                    const consoleUrl = item.dataset.consoleUrl;
                    if (consoleUrl) {
                        window.open(consoleUrl, '_blank');
                    }
                });
            });
        }

        function setupCardListeners() {
            document.querySelectorAll('.api-card').forEach(card => {
                card.addEventListener('click', () => {
                    const consoleUrl = card.dataset.consoleUrl;
                    if (consoleUrl) {
                        window.open(consoleUrl, '_blank');
                    }
                });
            });
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.format;
                filterApis();
            });
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            filterApis();
        });

        // Filter APIs based on current filter and search
        function filterApis() {
            const cards = document.querySelectorAll('.api-card');
            const treeItems = document.querySelectorAll('.api-tree-item');
            const scenarios = document.querySelectorAll('.scenario-item');
            const formatGroups = document.querySelectorAll('.format-group');

            let visibleCount = 0;

            cards.forEach(card => {
                const format = card.dataset.format;
                const scenario = card.dataset.scenario;
                const apiId = card.dataset.apiId;
                const api = apiData.find(a => a.id === apiId);

                const matchesFilter = currentFilter === 'all' || format === currentFilter;
                const matchesSearch = !searchTerm ||
                    scenario.toLowerCase().includes(searchTerm) ||
                    (api && api.title.toLowerCase().includes(searchTerm)) ||
                    (api && api.apiName.toLowerCase().includes(searchTerm));

                if (matchesFilter && matchesSearch) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Update sidebar tree visibility
            treeItems.forEach(item => {
                const format = item.dataset.format;
                const scenario = item.dataset.scenario;
                const apiId = item.dataset.apiId;
                const api = apiData.find(a => a.id === apiId);

                const matchesFilter = currentFilter === 'all' || format === currentFilter;
                const matchesSearch = !searchTerm ||
                    scenario.toLowerCase().includes(searchTerm) ||
                    (api && api.title.toLowerCase().includes(searchTerm)) ||
                    (api && api.apiName.toLowerCase().includes(searchTerm));

                item.style.display = matchesFilter && matchesSearch ? 'block' : 'none';
            });

            // Hide empty format groups
            formatGroups.forEach(group => {
                const visibleItems = Array.from(group.querySelectorAll('.api-tree-item'))
                    .filter(item => item.style.display !== 'none');
                group.style.display = visibleItems.length > 0 ? 'block' : 'none';
            });

            // Hide empty scenarios
            scenarios.forEach(scenario => {
                const visibleGroups = Array.from(scenario.querySelectorAll('.format-group'))
                    .filter(group => group.style.display !== 'none');
                scenario.style.display = visibleGroups.length > 0 ? 'block' : 'none';
            });

            // Update total count
            document.getElementById('totalCount').textContent = visibleCount;

            // Show no results message
            const grid = document.getElementById('apiGrid');
            if (visibleCount === 0) {
                if (!document.getElementById('noResults')) {
                    const noResults = document.createElement('div');
                    noResults.id = 'noResults';
                    noResults.className = 'no-results';
                    noResults.innerHTML = `
                        <div class="no-results-icon">🔍</div>
                        <h3>No APIs found</h3>
                        <p>Try adjusting your search or filter criteria</p>
                    `;
                    grid.appendChild(noResults);
                }
            } else {
                const noResults = document.getElementById('noResults');
                if (noResults) {
                    noResults.remove();
                }
            }
        }

        // Load data on page load
        loadAPIData();
    </script>
</body>
</html>
