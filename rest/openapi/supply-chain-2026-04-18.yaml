openapi: 3.0.0
info:
  title: Supply Chain API
  version: 1.0.0
  description: >
    API for managing suppliers, products, warehouses, inventory,
    purchase orders, and shipments in a supply chain system.

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://sandbox.api.example.com/v1
    description: Sandbox

tags:
  - name: Suppliers
  - name: Products
  - name: Warehouses
  - name: Inventory
  - name: Purchase Orders
  - name: Shipments

paths:
  /suppliers:
    get:
      tags: [Suppliers]
      summary: List suppliers
      operationId: listSuppliers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: Suppliers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierListResponse'
    post:
      tags: [Suppliers]
      summary: Create supplier
      operationId: createSupplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplierRequest'
      responses:
        '201':
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '400':
          $ref: '#/components/responses/BadRequest'

  /suppliers/{supplierId}:
    get:
      tags: [Suppliers]
      summary: Get supplier by ID
      operationId: getSupplierById
      parameters:
        - $ref: '#/components/parameters/SupplierId'
      responses:
        '200':
          description: Supplier retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Suppliers]
      summary: Update supplier
      operationId: updateSupplier
      parameters:
        - $ref: '#/components/parameters/SupplierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSupplierRequest'
      responses:
        '200':
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Suppliers]
      summary: Delete supplier
      operationId: deleteSupplier
      parameters:
        - $ref: '#/components/parameters/SupplierId'
      responses:
        '204':
          description: Supplier deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /products:
    get:
      tags: [Products]
      summary: List products
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: sku
          in: query
          schema:
            type: string
        - name: supplierId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      tags: [Products]
      summary: Create product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'

  /products/{productId}:
    get:
      tags: [Products]
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Products]
      summary: Update product
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Products]
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /warehouses:
    get:
      tags: [Warehouses]
      summary: List warehouses
      operationId: listWarehouses
      responses:
        '200':
          description: Warehouses retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseListResponse'
    post:
      tags: [Warehouses]
      summary: Create warehouse
      operationId: createWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehouseRequest'
      responses:
        '201':
          description: Warehouse created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'

  /warehouses/{warehouseId}:
    get:
      tags: [Warehouses]
      summary: Get warehouse by ID
      operationId: getWarehouseById
      parameters:
        - $ref: '#/components/parameters/WarehouseId'
      responses:
        '200':
          description: Warehouse retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '404':
          $ref: '#/components/responses/NotFound'

  /inventory:
    get:
      tags: [Inventory]
      summary: List inventory records
      operationId: listInventory
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: warehouseId
          in: query
          schema:
            type: string
            format: uuid
        - name: lowStockOnly
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Inventory retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryListResponse'

  /inventory/{inventoryId}:
    get:
      tags: [Inventory]
      summary: Get inventory record by ID
      operationId: getInventoryById
      parameters:
        - $ref: '#/components/parameters/InventoryId'
      responses:
        '200':
          description: Inventory record retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryRecord'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Inventory]
      summary: Adjust inventory quantity
      operationId: adjustInventory
      parameters:
        - $ref: '#/components/parameters/InventoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustInventoryRequest'
      responses:
        '200':
          description: Inventory adjusted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /purchase-orders:
    get:
      tags: [Purchase Orders]
      summary: List purchase orders
      operationId: listPurchaseOrders
      parameters:
        - name: supplierId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, approved, partially_received, received, cancelled]
      responses:
        '200':
          description: Purchase orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderListResponse'
    post:
      tags: [Purchase Orders]
      summary: Create purchase order
      operationId: createPurchaseOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseOrderRequest'
      responses:
        '201':
          description: Purchase order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '400':
          $ref: '#/components/responses/BadRequest'

  /purchase-orders/{purchaseOrderId}:
    get:
      tags: [Purchase Orders]
      summary: Get purchase order by ID
      operationId: getPurchaseOrderById
      parameters:
        - $ref: '#/components/parameters/PurchaseOrderId'
      responses:
        '200':
          description: Purchase order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '404':
          $ref: '#/components/responses/NotFound'

  /purchase-orders/{purchaseOrderId}/receive:
    post:
      tags: [Purchase Orders]
      summary: Receive items for a purchase order
      operationId: receivePurchaseOrder
      parameters:
        - $ref: '#/components/parameters/PurchaseOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceivePurchaseOrderRequest'
      responses:
        '200':
          description: Purchase order receipt recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /shipments:
    get:
      tags: [Shipments]
      summary: List shipments
      operationId: listShipments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [planned, in_transit, delivered, delayed, cancelled]
        - name: purchaseOrderId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shipments retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentListResponse'
    post:
      tags: [Shipments]
      summary: Create shipment
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '201':
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '400':
          $ref: '#/components/responses/BadRequest'

  /shipments/{shipmentId}:
    get:
      tags: [Shipments]
      summary: Get shipment by ID
      operationId: getShipmentById
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Shipment retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '404':
          $ref: '#/components/responses/NotFound'

  /shipments/{shipmentId}/track:
    get:
      tags: [Shipments]
      summary: Track shipment
      operationId: trackShipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Shipment tracking retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentTracking'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    SupplierId:
      name: supplierId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    WarehouseId:
      name: warehouseId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    InventoryId:
      name: inventoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PurchaseOrderId:
      name: purchaseOrderId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ShipmentId:
      name: shipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Supplier:
      type: object
      required:
        - id
        - name
        - status
        - contactEmail
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        contactName:
          type: string
        contactEmail:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time

    CreateSupplierRequest:
      type: object
      required:
        - name
        - contactEmail
      properties:
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    UpdateSupplierRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        contactName:
          type: string
        contactEmail:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    Product:
      type: object
      required:
        - id
        - sku
        - name
        - unitOfMeasure
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        supplierId:
          type: string
          format: uuid
        unitOfMeasure:
          type: string
          enum: [each, box, case, pallet, kilogram, pound, liter]
        unitPrice:
          type: number
          format: float
        reorderPoint:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - sku
        - name
        - unitOfMeasure
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        supplierId:
          type: string
          format: uuid
        unitOfMeasure:
          type: string
          enum: [each, box, case, pallet, kilogram, pound, liter]
        unitPrice:
          type: number
          format: float
        reorderPoint:
          type: integer
          minimum: 0

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        supplierId:
          type: string
          format: uuid
        unitOfMeasure:
          type: string
          enum: [each, box, case, pallet, kilogram, pound, liter]
        unitPrice:
          type: number
          format: float
        reorderPoint:
          type: integer
          minimum: 0

    Warehouse:
      type: object
      required:
        - id
        - code
        - name
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        capacity:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateWarehouseRequest:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        capacity:
          type: integer
          minimum: 0

    InventoryRecord:
      type: object
      required:
        - id
        - productId
        - warehouseId
        - quantityOnHand
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        quantityOnHand:
          type: integer
        quantityReserved:
          type: integer
        quantityAvailable:
          type: integer
        lastUpdatedAt:
          type: string
          format: date-time

    AdjustInventoryRequest:
      type: object
      required:
        - adjustmentType
        - quantity
      properties:
        adjustmentType:
          type: string
          enum: [increase, decrease, set]
        quantity:
          type: integer
        reason:
          type: string

    PurchaseOrder:
      type: object
      required:
        - id
        - supplierId
        - status
        - orderDate
        - items
      properties:
        id:
          type: string
          format: uuid
        supplierId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, submitted, approved, partially_received, received, cancelled]
        orderDate:
          type: string
          format: date
        expectedDeliveryDate:
          type: string
          format: date
        currency:
          type: string
          example: USD
        totalAmount:
          type: number
          format: float
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderItem'

    PurchaseOrderItem:
      type: object
      required:
        - productId
        - quantity
        - unitPrice
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: float
        receivedQuantity:
          type: integer
          minimum: 0

    CreatePurchaseOrderRequest:
      type: object
      required:
        - supplierId
        - orderDate
        - items
      properties:
        supplierId:
          type: string
          format: uuid
        orderDate:
          type: string
          format: date
        expectedDeliveryDate:
          type: string
          format: date
        currency:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PurchaseOrderItem'

    ReceivePurchaseOrderRequest:
      type: object
      required:
        - warehouseId
        - receivedItems
      properties:
        warehouseId:
          type: string
          format: uuid
        receivedItems:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1

    Shipment:
      type: object
      required:
        - id
        - shipmentNumber
        - status
      properties:
        id:
          type: string
          format: uuid
        shipmentNumber:
          type: string
        purchaseOrderId:
          type: string
          format: uuid
        carrier:
          type: string
        trackingNumber:
          type: string
        originWarehouseId:
          type: string
          format: uuid
        destinationWarehouseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [planned, in_transit, delivered, delayed, cancelled]
        estimatedArrival:
          type: string
          format: date-time
        shippedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time

    CreateShipmentRequest:
      type: object
      required:
        - shipmentNumber
        - status
      properties:
        shipmentNumber:
          type: string
        purchaseOrderId:
          type: string
          format: uuid
        carrier:
          type: string
        trackingNumber:
          type: string
        originWarehouseId:
          type: string
          format: uuid
        destinationWarehouseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [planned, in_transit, delivered, delayed, cancelled]
        estimatedArrival:
          type: string
          format: date-time

    ShipmentTracking:
      type: object
      required:
        - shipmentId
        - status
        - events
      properties:
        shipmentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [planned, in_transit, delivered, delayed, cancelled]
        currentLocation:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/TrackingEvent'

    TrackingEvent:
      type: object
      required:
        - timestamp
        - description
      properties:
        timestamp:
          type: string
          format: date-time
        location:
          type: string
        description:
          type: string

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    Pagination:
      type: object
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    SupplierListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Supplier'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ProductListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/Pagination'

    WarehouseListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Warehouse'

    InventoryListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InventoryRecord'

    PurchaseOrderListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrder'

    ShipmentListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Shipment'

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string