openapi: 3.0.0
info:
  title: Healthcare Patient Management API
  version: 1.0.0
  description: >
    Enterprise API for managing patients, healthcare providers, appointments,
    prescriptions, and medical records. Designed for integration with
    electronic health record (EHR) systems, practice management platforms,
    and patient portals.
  contact:
    name: Health IT Platform Team
    email: health-platform@examplehealth.com

servers:
  - url: https://api.examplehealth.com/v1
    description: Production
  - url: https://sandbox.examplehealth.com/v1
    description: Sandbox

tags:
  - name: Patients
    description: Patient demographics, insurance, and contact information
  - name: Providers
    description: Healthcare providers and their credentials
  - name: Appointments
    description: Scheduling, check-in, and appointment lifecycle
  - name: Prescriptions
    description: Medication orders, dosages, and refill tracking
  - name: MedicalRecords
    description: Clinical documents, lab results, imaging, and encounter notes

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Patients
  # ---------------------------------------------------------------------------
  /patients:
    get:
      tags: [Patients]
      summary: List patients
      description: Returns a paginated list of patients with optional filters.
      operationId: listPatients
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by patient status.
          schema:
            type: string
            enum: [Active, Inactive, Deceased]
        - name: primaryProviderId
          in: query
          description: Filter by assigned primary provider.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Patients retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Patients]
      summary: Create patient
      description: Registers a new patient in the system.
      operationId: createPatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /patients/{patientId}:
    parameters:
      - $ref: '#/components/parameters/PatientId'
    get:
      tags: [Patients]
      summary: Get patient
      description: Retrieves a single patient by identifier.
      operationId: getPatient
      responses:
        '200':
          description: Patient retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Patients]
      summary: Update patient
      description: Replaces all mutable fields on an existing patient record.
      operationId: updatePatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Patients]
      summary: Delete patient
      description: Soft-deletes a patient record.
      operationId: deletePatient
      responses:
        '204':
          description: Patient deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Providers
  # ---------------------------------------------------------------------------
  /providers:
    get:
      tags: [Providers]
      summary: List providers
      description: Returns a paginated list of healthcare providers.
      operationId: listProviders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by provider status.
          schema:
            type: string
            enum: [Active, OnLeave, Inactive]
        - name: specialty
          in: query
          description: Filter by medical specialty.
          schema:
            type: string
        - name: acceptingNewPatients
          in: query
          description: Filter providers currently accepting new patients.
          schema:
            type: boolean
      responses:
        '200':
          description: Providers retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Providers]
      summary: Create provider
      description: Registers a new healthcare provider.
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderRequest'
      responses:
        '201':
          description: Provider created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /providers/{providerId}:
    parameters:
      - $ref: '#/components/parameters/ProviderId'
    get:
      tags: [Providers]
      summary: Get provider
      description: Retrieves a single provider by identifier.
      operationId: getProvider
      responses:
        '200':
          description: Provider retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Providers]
      summary: Update provider
      description: Updates an existing provider record.
      operationId: updateProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProviderRequest'
      responses:
        '200':
          description: Provider updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Providers]
      summary: Delete provider
      description: Soft-deletes a provider record.
      operationId: deleteProvider
      responses:
        '204':
          description: Provider deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Appointments
  # ---------------------------------------------------------------------------
  /appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      description: Returns a paginated list of appointments with optional filters.
      operationId: listAppointments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: patientId
          in: query
          description: Filter by patient.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: query
          description: Filter by provider.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by appointment status.
          schema:
            type: string
            enum: [Scheduled, CheckedIn, InProgress, Completed, Cancelled, NoShow]
        - name: scheduledAfter
          in: query
          description: Return appointments scheduled on or after this date-time.
          schema:
            type: string
            format: date-time
        - name: scheduledBefore
          in: query
          description: Return appointments scheduled on or before this date-time.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Appointments retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Appointments]
      summary: Create appointment
      description: Schedules a new appointment for a patient with a provider.
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /appointments/{appointmentId}:
    parameters:
      - $ref: '#/components/parameters/AppointmentId'
    get:
      tags: [Appointments]
      summary: Get appointment
      description: Retrieves a single appointment by identifier.
      operationId: getAppointment
      responses:
        '200':
          description: Appointment retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Appointments]
      summary: Update appointment
      description: Updates the details of an existing appointment.
      operationId: updateAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppointmentRequest'
      responses:
        '200':
          description: Appointment updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /appointments/{appointmentId}/cancel:
    parameters:
      - $ref: '#/components/parameters/AppointmentId'
    post:
      tags: [Appointments]
      summary: Cancel appointment
      description: Cancels a scheduled appointment. A cancellation reason may be provided.
      operationId: cancelAppointment
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: Appointment cancelled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Prescriptions
  # ---------------------------------------------------------------------------
  /prescriptions:
    get:
      tags: [Prescriptions]
      summary: List prescriptions
      description: Returns a paginated list of prescriptions with optional filters.
      operationId: listPrescriptions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: patientId
          in: query
          description: Filter by patient.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: query
          description: Filter by prescribing provider.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by prescription status.
          schema:
            type: string
            enum: [Active, Completed, Cancelled, OnHold]
      responses:
        '200':
          description: Prescriptions retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Prescriptions]
      summary: Create prescription
      description: Creates a new prescription order for a patient.
      operationId: createPrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrescriptionRequest'
      responses:
        '201':
          description: Prescription created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /prescriptions/{prescriptionId}:
    parameters:
      - $ref: '#/components/parameters/PrescriptionId'
    get:
      tags: [Prescriptions]
      summary: Get prescription
      description: Retrieves a single prescription by identifier.
      operationId: getPrescription
      responses:
        '200':
          description: Prescription retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Prescriptions]
      summary: Update prescription
      description: Updates an existing prescription order.
      operationId: updatePrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrescriptionRequest'
      responses:
        '200':
          description: Prescription updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Medical Records
  # ---------------------------------------------------------------------------
  /medical-records:
    get:
      tags: [MedicalRecords]
      summary: List medical records
      description: Returns a paginated list of medical records with optional filters.
      operationId: listMedicalRecords
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: patientId
          in: query
          description: Filter by patient.
          schema:
            type: string
            format: uuid
        - name: providerId
          in: query
          description: Filter by authoring provider.
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          description: Filter by record type.
          schema:
            type: string
            enum: [LabResult, Imaging, Diagnosis, Procedure, Note, Referral]
        - name: confidentiality
          in: query
          description: Filter by confidentiality level.
          schema:
            type: string
            enum: [Normal, Restricted, VeryRestricted]
      responses:
        '200':
          description: Medical records retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [MedicalRecords]
      summary: Create medical record
      description: Creates a new medical record entry for a patient encounter.
      operationId: createMedicalRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicalRecordRequest'
      responses:
        '201':
          description: Medical record created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    get:
      tags: [MedicalRecords]
      summary: Get medical record
      description: Retrieves a single medical record by identifier.
      operationId: getMedicalRecord
      responses:
        '200':
          description: Medical record retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      description: One-based page number for pagination.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: Number of records per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    PatientId:
      name: patientId
      in: path
      required: true
      description: Unique patient identifier.
      schema:
        type: string
        format: uuid
    ProviderId:
      name: providerId
      in: path
      required: true
      description: Unique provider identifier.
      schema:
        type: string
        format: uuid
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      description: Unique appointment identifier.
      schema:
        type: string
        format: uuid
    PrescriptionId:
      name: prescriptionId
      in: path
      required: true
      description: Unique prescription identifier.
      schema:
        type: string
        format: uuid
    RecordId:
      name: recordId
      in: path
      required: true
      description: Unique medical record identifier.
      schema:
        type: string
        format: uuid

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: The request payload is invalid or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # ---- Pagination & Errors ------------------------------------------------
    PaginationMeta:
      type: object
      description: Pagination metadata included in every list response.
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
          description: Current page number.
          example: 1
        pageSize:
          type: integer
          description: Number of records per page.
          example: 25
        totalItems:
          type: integer
          description: Total number of records matching the query.
          example: 142
        totalPages:
          type: integer
          description: Total number of pages.
          example: 6

    ErrorResponse:
      type: object
      description: Standard error envelope returned for all non-2xx responses.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message.
          example: The request body failed validation.
        details:
          type: array
          description: Field-level validation errors when applicable.
          items:
            $ref: '#/components/schemas/ErrorDetail'
        traceId:
          type: string
          description: Correlation identifier for support and debugging.
          example: abc-123-def-456

    ErrorDetail:
      type: object
      description: A single field-level validation error.
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: JSON path of the invalid field.
          example: dateOfBirth
        message:
          type: string
          description: Explanation of the validation failure.
          example: Must be a valid past date.

    # ---- Shared / Embedded Objects ------------------------------------------
    Address:
      type: object
      description: A physical mailing address.
      properties:
        street:
          type: string
          maxLength: 200
          example: 742 Evergreen Terrace
        city:
          type: string
          maxLength: 100
          example: Springfield
        state:
          type: string
          minLength: 2
          maxLength: 2
          description: Two-letter US state code.
          example: IL
        zipCode:
          type: string
          pattern: '^\d{5}(-\d{4})?$'
          example: '62704'

    # ---- Patient Schemas ----------------------------------------------------
    Patient:
      type: object
      description: Full patient record including demographics, insurance, and clinical metadata.
      required:
        - patientId
        - mrn
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - status
        - createdAt
        - updatedAt
      properties:
        patientId:
          type: string
          format: uuid
          description: System-generated unique identifier.
          example: 5f8b3c2a-1d4e-4f6a-9b8c-7e2d1a3f5b6c
        mrn:
          type: string
          description: Medical record number assigned by the facility.
          minLength: 6
          maxLength: 20
          example: MRN-204718
        firstName:
          type: string
          maxLength: 100
          example: Maria
        lastName:
          type: string
          maxLength: 100
          example: Santos
        dateOfBirth:
          type: string
          format: date
          description: Patient date of birth (YYYY-MM-DD).
          example: '1985-07-14'
        gender:
          type: string
          enum: [Male, Female, NonBinary, Other]
          example: Female
        email:
          type: string
          format: email
          maxLength: 254
          example: maria.santos@example.com
        phone:
          type: string
          maxLength: 20
          example: '+1-555-867-5309'
        address:
          $ref: '#/components/schemas/Address'
        insuranceProvider:
          type: string
          maxLength: 150
          description: Name of the patient's insurance carrier.
          example: Blue Cross Blue Shield
        insurancePolicyNumber:
          type: string
          maxLength: 50
          description: Policy or member ID issued by the insurer.
          example: BCBS-9938271
        primaryProviderId:
          type: string
          format: uuid
          description: Identifier of the patient's primary care provider.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        status:
          type: string
          enum: [Active, Inactive, Deceased]
          example: Active
        bloodType:
          type: string
          enum: [A+, A-, B+, B-, AB+, AB-, O+, O-]
          description: ABO/Rh blood type.
          example: O+
        allergies:
          type: array
          description: Known patient allergies.
          items:
            type: string
          example: [Penicillin, Sulfa, Latex]
        emergencyContactName:
          type: string
          maxLength: 200
          example: Carlos Santos
        emergencyContactPhone:
          type: string
          maxLength: 20
          example: '+1-555-123-4567'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created.
          example: '2024-01-15T09:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the record was last updated.
          example: '2025-11-02T14:22:00Z'

    PatientListResponse:
      type: object
      description: Paginated list of patients.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Patient'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    CreatePatientRequest:
      type: object
      description: Payload for registering a new patient.
      required:
        - mrn
        - firstName
        - lastName
        - dateOfBirth
        - gender
      properties:
        mrn:
          type: string
          minLength: 6
          maxLength: 20
          example: MRN-204718
        firstName:
          type: string
          maxLength: 100
          example: Maria
        lastName:
          type: string
          maxLength: 100
          example: Santos
        dateOfBirth:
          type: string
          format: date
