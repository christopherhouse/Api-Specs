    # ---- Prescription Schemas -----------------------------------------------
    Prescription:
      type: object
      description: A medication prescription order.
      required:
        - prescriptionId
        - patientId
        - providerId
        - medication
        - dosage
        - frequency
        - route
        - startDate
        - status
      properties:
        prescriptionId:
          type: string
          format: uuid
          description: System-generated unique identifier.
          example: e1f2a3b4-c5d6-7890-ef12-3456789abcde
        patientId:
          type: string
          format: uuid
          description: Identifier of the patient.
          example: 5f8b3c2a-1d4e-4f6a-9b8c-7e2d1a3f5b6c
        providerId:
          type: string
          format: uuid
          description: Identifier of the prescribing provider.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        medication:
          type: string
          maxLength: 250
          description: Name of the prescribed medication.
          example: Amoxicillin
        dosage:
          type: string
          maxLength: 100
          description: Dosage amount and unit.
          example: 500 mg
        frequency:
          type: string
          maxLength: 100
          description: How often the medication should be taken.
          example: Three times daily
        route:
          type: string
          enum: [Oral, Topical, Injection, Inhalation, Intravenous]
          description: Route of administration.
          example: Oral
        startDate:
          type: string
          format: date
          description: Date the prescription becomes effective.
          example: '2026-04-20'
        endDate:
          type: string
          format: date
          description: Date the prescription expires.
          example: '2026-05-04'
        refillsRemaining:
          type: integer
          minimum: 0
          description: Number of refills remaining.
          example: 2
        refillsTotal:
          type: integer
          minimum: 0
          description: Total number of refills originally authorized.
          example: 3
        status:
          type: string
          enum: [Active, Completed, Cancelled, OnHold]
          example: Active
        pharmacy:
          type: string
          maxLength: 200
          description: Pharmacy where the prescription is filled.
          example: Walgreens - 123 Main St
        notes:
          type: string
          maxLength: 1000
          description: Additional prescriber notes.
          example: Take with food. Avoid alcohol.

    PrescriptionListResponse:
      type: object
      description: Paginated list of prescriptions.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Prescription'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

