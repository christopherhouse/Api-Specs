    # ---- Provider Schemas ---------------------------------------------------
    Provider:
      type: object
      description: Healthcare provider record including credentials and availability.
      required:
        - providerId
        - npi
        - firstName
        - lastName
        - specialty
        - status
      properties:
        providerId:
          type: string
          format: uuid
          description: System-generated unique identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        npi:
          type: string
          description: National Provider Identifier (10-digit).
          pattern: '^\d{10}$'
          example: '1234567890'
        firstName:
          type: string
          maxLength: 100
          example: James
        lastName:
          type: string
          maxLength: 100
          example: Wilson
        specialty:
          type: string
          maxLength: 150
          description: Medical specialty or area of practice.
          example: Internal Medicine
        email:
          type: string
          format: email
          maxLength: 254
          example: j.wilson@examplehealth.com
        phone:
          type: string
          maxLength: 20
          example: '+1-555-234-5678'
        department:
          type: string
          maxLength: 150
          description: Hospital or clinic department.
          example: Primary Care
        status:
          type: string
          enum: [Active, OnLeave, Inactive]
          example: Active
        licenseNumber:
          type: string
          maxLength: 50
          description: State medical license number.
          example: MD-2024-88431
        licenseState:
          type: string
          minLength: 2
          maxLength: 2
          description: Two-letter US state code where the license was issued.
