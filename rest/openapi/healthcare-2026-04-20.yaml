    # ---- Appointment Schemas ------------------------------------------------
    Appointment:
      type: object
      description: A scheduled or completed patient-provider appointment.
      required:
        - appointmentId
        - patientId
        - providerId
        - scheduledStart
        - scheduledEnd
        - type
        - status
        - createdAt
      properties:
        appointmentId:
          type: string
          format: uuid
          description: System-generated unique identifier.
          example: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90
        patientId:
          type: string
          format: uuid
          description: Identifier of the patient.
          example: 5f8b3c2a-1d4e-4f6a-9b8c-7e2d1a3f5b6c
        providerId:
          type: string
          format: uuid
          description: Identifier of the provider.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        scheduledStart:
          type: string
          format: date-time
          description: Scheduled start time of the appointment.
          example: '2026-05-10T09:00:00Z'
        scheduledEnd:
          type: string
          format: date-time
          description: Scheduled end time of the appointment.
          example: '2026-05-10T09:30:00Z'
        type:
          type: string
          enum: [Consultation, FollowUp, Procedure, Screening, Urgent]
          example: Consultation
        status:
          type: string
          enum: [Scheduled, CheckedIn, InProgress, Completed, Cancelled, NoShow]
          example: Scheduled
        reason:
          type: string
          maxLength: 500
          description: Reason for the visit.
          example: Annual physical examination
        notes:
          type: string
          maxLength: 2000
          description: Additional notes from staff or provider.
          example: Patient requested early morning slot.
        location:
          type: string
          maxLength: 200
          description: Facility or room where the appointment takes place.
          example: Building A, Room 204
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the appointment was created.
          example: '2026-04-20T11:15:00Z'

    AppointmentListResponse:
      type: object
      description: Paginated list of appointments.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    CreateAppointmentRequest:
      type: object
