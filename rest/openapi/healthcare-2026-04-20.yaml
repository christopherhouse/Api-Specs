          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        scheduledStart:
          type: string
          format: date-time
          example: '2026-05-10T09:00:00Z'
        scheduledEnd:
          type: string
          format: date-time
          example: '2026-05-10T09:30:00Z'
        type:
          type: string
          enum: [Consultation, FollowUp, Procedure, Screening, Urgent]
          example: Consultation
        reason:
          type: string
          maxLength: 500
          example: Annual physical examination
        notes:
          type: string
          maxLength: 2000
          example: Patient requested early morning slot.
        location:
          type: string
          maxLength: 200
          example: Building A, Room 204

    UpdateAppointmentRequest:
