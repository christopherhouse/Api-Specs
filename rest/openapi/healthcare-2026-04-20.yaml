    # ---- Medical Record Schemas ---------------------------------------------
    MedicalRecord:
      type: object
      description: A clinical document or encounter record.
      required:
        - recordId
        - patientId
        - providerId
        - encounterDate
        - type
        - title
        - confidentiality
        - createdAt
      properties:
        recordId:
          type: string
          format: uuid
          description: System-generated unique identifier.
          example: f0e1d2c3-b4a5-6789-0fed-cba987654321
        patientId:
          type: string
          format: uuid
          description: Identifier of the patient.
          example: 5f8b3c2a-1d4e-4f6a-9b8c-7e2d1a3f5b6c
        providerId:
          type: string
          format: uuid
          description: Identifier of the authoring provider.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        encounterDate:
          type: string
          format: date
          description: Date the clinical encounter took place.
          example: '2026-04-18'
        type:
          type: string
          enum: [LabResult, Imaging, Diagnosis, Procedure, Note, Referral]
          description: Category of the medical record.
          example: LabResult
        title:
          type: string
          maxLength: 300
          description: Short title summarizing the record.
          example: Complete Blood Count (CBC)
        description:
          type: string
          maxLength: 2000
          description: Detailed description of the record.
          example: Routine CBC panel ordered as part of annual check-up.
        findings:
          type: string
          maxLength: 5000
          description: Clinical findings or results.
          example: WBC 7.2, RBC 4.8, Hemoglobin 14.1, Hematocrit 42%, Platelets 250
        attachmentUrl:
          type: string
          format: uri
          maxLength: 2048
          description: URL to an attached document or image.
          example: https://storage.examplehealth.com/records/f0e1d2c3/cbc-report.pdf
        confidentiality:
          type: string
          enum: [Normal, Restricted, VeryRestricted]
          description: Confidentiality classification of the record.
          example: Normal
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created.
          example: '2026-04-18T16:45:00Z'

    MedicalRecordListResponse:
      type: object
      description: Paginated list of medical records.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MedicalRecord'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

