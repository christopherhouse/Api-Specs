name: Lint & Release API Specs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    name: Lint Specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Install raml-cop
        run: npm install -g raml-cop

      - name: Install graphql-schema-linter
        run: npm install -g graphql-schema-linter

      - name: Install libxml2 utilities
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Lint OpenAPI specs
        run: |
          echo "🔍 Linting OpenAPI specs..."
          EXIT_CODE=0
          for spec in scenarios/*/rest/openapi/json/*.json scenarios/*/rest/openapi/yaml/*.yaml scenarios/*/rest/openapi/yaml/*.yml; do
            [ -f "$spec" ] || continue
            echo "  ➜ $spec"
            if ! spectral lint "$spec" --ruleset .spectral.yaml; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Validate OpenAPI specs for Azure APIM compatibility
        run: |
          echo "🔍 Validating OpenAPI specs for Azure APIM compatibility..."
          EXIT_CODE=0
          SPECS=$(find scenarios -path "*/openapi/json/*.json" -o -path "*/openapi/yaml/*.yaml" -o -path "*/openapi/yaml/*.yml" 2>/dev/null | sort)
          if [ -z "$SPECS" ]; then
            echo "  No OpenAPI specs found to validate"
            exit 0
          fi
          for spec in $SPECS; do
            [ -f "$spec" ] || continue
            echo "  ➜ $spec"
            if ! python tools/validate-apim-openapi.py "$spec"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Validate WADL files (XML well-formedness)
        run: |
          echo "🔍 Validating WADL files..."
          EXIT_CODE=0
          for wadl in scenarios/*/rest/wadl/*.wadl; do
            [ -f "$wadl" ] || continue
            echo "  ➜ $wadl"
            if ! xmllint --noout "$wadl"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Lint RAML specs
        run: |
          echo "🔍 Linting RAML specs..."
          EXIT_CODE=0
          for spec in scenarios/*/rest/raml/*.raml; do
            [ -f "$spec" ] || continue
            echo "  ➜ $spec"
            if ! raml-cop "$spec"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Validate WSDL files (XML well-formedness)
        run: |
          echo "🔍 Validating WSDL files..."
          EXIT_CODE=0
          for wsdl in scenarios/*/soap/*.wsdl; do
            [ -f "$wsdl" ] || continue
            echo "  ➜ $wsdl"
            if ! xmllint --noout "$wsdl"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Lint GraphQL specs
        run: |
          echo "🔍 Linting GraphQL specs..."
          EXIT_CODE=0
          for spec in scenarios/*/graphql/*.graphql; do
            [ -f "$spec" ] || continue
            echo "  ➜ $spec"
            if ! graphql-schema-linter "$spec"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Install mock server dependencies
        working-directory: mock-server
        run: npm ci

      - name: Lint mock server
        working-directory: mock-server
        run: npm run lint

      - name: Run mock server tests
        working-directory: mock-server
        run: npm test -- --coverage

  release:
    name: Release
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(echo ${GITHUB_SHA} | cut -c1-7)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package specs
        run: |
          mkdir -p dist
          tar -czf dist/api-specs-${{ steps.version.outputs.tag }}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='node_modules' \
            scenarios/ README.md LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: API Specs ${{ steps.version.outputs.tag }}
          body: |
            📦 API Specs release from merge to `main`.

            **Commit:** ${{ github.sha }}
          files: dist/api-specs-${{ steps.version.outputs.tag }}.tar.gz
          generate_release_notes: true

  docker:
    name: Build & Push Docker Image
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/api-specs-mock-server
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mock-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
